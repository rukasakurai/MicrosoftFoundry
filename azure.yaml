# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: microsoft-foundry
metadata:
  template: microsoft-foundry@0.0.1
infra:
  provider: bicep
  path: infra
  module: main
hooks:
  postprovision:
    posix:
      shell: sh
      run: ./scripts/foundry-iq-setup.sh && ./scripts/deploy-foundry-guide.sh && ./scripts/deploy-token-usage-api.sh
      interactive: false
      continueOnError: false
