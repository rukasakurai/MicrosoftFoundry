name: Foundry Guide Feedback Issue Loop

on:
  workflow_dispatch:

permissions: {}

jobs:
  create-feedback-issue:
    if: ${{ vars.FOUNDRY_GUIDE_FEEDBACK_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      # Enable only after deciding the issue audience is appropriate for the environment.
      issues: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create or update aggregate feedback issue
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.FOUNDRY_GUIDE_RESOURCE_GROUP }}
          APPLICATION_INSIGHTS_NAME: ${{ vars.FOUNDRY_GUIDE_APPLICATION_INSIGHTS_NAME }}
          FOUNDRY_GUIDE_AGENT_NAME: ${{ vars.FOUNDRY_GUIDE_AGENT_NAME || 'foundry-guide' }}
          FOUNDRY_GUIDE_FEEDBACK_LOOKBACK: ${{ vars.FOUNDRY_GUIDE_FEEDBACK_LOOKBACK || '7d' }}
          FOUNDRY_GUIDE_MIN_NEGATIVE_FEEDBACK: ${{ vars.FOUNDRY_GUIDE_MIN_NEGATIVE_FEEDBACK || '3' }}
          FOUNDRY_GUIDE_FEEDBACK_DRY_RUN: ${{ vars.FOUNDRY_GUIDE_FEEDBACK_DRY_RUN || 'false' }}
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/create-feedback-issue.sh
